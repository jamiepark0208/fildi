kind = "web"
previewPath = "/"
title = "Stock Comparison Tool"
version = "1.0.0"
id = "artifacts/stock-compare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23426

[services.development]
run = "pnpm --filter @workspace/stock-compare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stock-compare", "run", "build" ]
publicDir = "artifacts/stock-compare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23426"
BASE_PATH = "/"
